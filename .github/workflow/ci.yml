name: Test Campaign

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  test:
    runs-on: windows-latest   # match your dev environment; use ubuntu-latest if platform-independent
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.14"]  # test across multiple versions

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html pytest-cov
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
        shell: pwsh

      - name: Run tests with reports
        run: |
          pytest --html=reports/report.html --self-contained-html --junitxml=reports/results.xml --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload HTML test report
        if: always()   # upload even if tests fail, so you can inspect failures
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.python-version }}
          path: reports/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml

      - name: Publish test results summary
        if: always()
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        with:
          files: reports/results.xml